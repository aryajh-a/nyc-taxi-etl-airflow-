name: patient-consent-ledger

services:
  # ---------- Streaming bus ----------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.5
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:28082,external://localhost:8082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "9092:9092"
      - "18081:18081"
      - "8082:8082"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # ---------- Airflow ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.10.4-python3.12
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-change-me}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.12
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.12
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
    command: scheduler

  # ---------- Cache ----------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- App placeholders (real code arrives in their phases) ----------
  consumer:
    build:
      context: ./apps/consumer
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP_INTERNAL:-redpanda:29092}
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-consent.events.raw}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-consent.events.dlq}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      BQ_DATASET_RAW: ${BQ_DATASET_RAW:-raw}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/bq-sa.json
    volumes:
      - ./secrets:/secrets:ro

  api:
    build:
      context: ./apps/api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP_INTERNAL:-redpanda:29092}
      REDIS_URL: ${REDIS_URL_LOCAL:-redis://redis:6379}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      API_KEY: ${API_KEY:-dev-api-key-change-me}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/bq-sa.json
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "8000:8000"

  dash:
    build:
      context: ./apps/dash
    depends_on:
      - api
    environment:
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/bq-sa.json
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "8050:8050"

  # ---------- One-shot init (run via `make seed-bq`) ----------
  bq-init:
    profiles: ["init"]
    image: python:3.12-slim
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/bq-sa.json
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      BQ_DATASET_RAW: ${BQ_DATASET_RAW:-raw}
      BQ_DATASET_STAGING: ${BQ_DATASET_STAGING:-staging}
      BQ_DATASET_MARTS: ${BQ_DATASET_MARTS:-marts}
      BQ_DATASET_DQ: ${BQ_DATASET_DQ:-dq}
    volumes:
      - ./secrets:/secrets:ro
      - ./infra/scripts:/scripts:ro
    command:
      - bash
      - -c
      - "pip install --quiet google-cloud-bigquery==3.27.0 && python /scripts/seed_bq.py"

volumes:
  postgres-data:
  airflow-logs:
